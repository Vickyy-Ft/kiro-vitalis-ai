<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Vitalis AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-bg"></div>
  <!-- Floating particles -->
  <canvas id="particles-canvas" style="position:absolute;inset:0;z-index:0;pointer-events:none;"></canvas>

  <div class="auth-card">
    <a href="index.html" class="auth-logo">VITALIS <span>AI</span></a>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your wellness operating system.</p>

    <form id="loginForm">
      <div class="form-group">
        <input type="email" id="email" placeholder="Email address" autocomplete="email" required />
        <label for="email">Email address</label>
      </div>
      <div class="form-group">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
        <label for="password">Password</label>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:20px;">
        <a href="#" style="font-size:12px;color:var(--text-muted);text-decoration:none;">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary auth-btn">
        Sign In <i class="fa-solid fa-arrow-right" style="margin-left:8px;"></i>
      </button>
    </form>

    <div class="auth-divider">or continue with</div>
    <div style="display:flex;gap:12px;">
      <button class="btn btn-outline" style="flex:1;justify-content:center;font-size:13px;">
        <i class="fa-brands fa-google"></i> Google
      </button>
      <button class="btn btn-outline" style="flex:1;justify-content:center;font-size:13px;">
        <i class="fa-brands fa-apple"></i> Apple
      </button>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>
  </div>
</div>
<script src="api.js"></script>
<script src="script.js"></script>


</body>
</html>
