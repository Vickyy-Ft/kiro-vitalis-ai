<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Vitalis AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-bg"></div>
  <canvas id="particles-canvas" style="position:absolute;inset:0;z-index:0;pointer-events:none;"></canvas>

  <div class="auth-card" style="max-width:480px;">
    <a href="index.html" class="auth-logo">VITALIS <span>AI</span></a>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Begin your AI-powered wellness journey today.</p>

    <form id="signupForm">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <input type="text" id="fname" placeholder="First name" required />
          <label for="fname">First name</label>
        </div>
        <div class="form-group">
          <input type="text" id="lname" placeholder="Last name" required />
          <label for="lname">Last name</label>
        </div>
      </div>
      <div class="form-group">
        <input type="email" id="email" placeholder="Email address" required />
        <label for="email">Email address</label>
      </div>
      <div class="form-group">
        <input type="password" id="password" placeholder="Password" required />
        <label for="password">Password (min. 8 characters)</label>
      </div>
      <div class="form-group">
        <input type="password" id="confirm" placeholder="Confirm password" required />
        <label for="confirm">Confirm password</label>
      </div>
      <div style="margin-bottom:20px;">
        <label style="display:flex;align-items:flex-start;gap:10px;font-size:12px;color:var(--text-muted);cursor:pointer;">
          <input type="checkbox" required style="margin-top:2px;accent-color:#fff;" />
          I agree to the <a href="#" style="color:var(--text-primary);margin:0 4px;">Terms of Service</a> and <a href="#" style="color:var(--text-primary);margin-left:4px;">Privacy Policy</a>
        </label>
      </div>
      <button type="submit" class="btn btn-primary auth-btn">
        Create Account <i class="fa-solid fa-arrow-right" style="margin-left:8px;"></i>
      </button>
    </form>

    <div class="auth-divider">or sign up with</div>
    <div style="display:flex;gap:12px;">
      <button class="btn btn-outline" style="flex:1;justify-content:center;font-size:13px;">
        <i class="fa-brands fa-google"></i> Google
      </button>
      <button class="btn btn-outline" style="flex:1;justify-content:center;font-size:13px;">
        <i class="fa-brands fa-apple"></i> Apple
      </button>
    </div>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>
<script src="api.js"></script>
<script src="script.js"></script>

</body>
</html>
